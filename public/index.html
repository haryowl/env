<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Monitoring System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .logo p {
            color: #666;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e1e5e9;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            color: #e74c3c;
            background: #fdf2f2;
            padding: 0.75rem;
            border-radius: 5px;
            margin-bottom: 1rem;
            display: none;
        }

        .success {
            color: #27ae60;
            background: #f0f9f4;
            padding: 0.75rem;
            border-radius: 5px;
            margin-bottom: 1rem;
            display: none;
        }

        .dashboard {
            display: none;
            max-width: 1200px;
            width: 100%;
        }

        .header {
            background: white;
            padding: 1rem 2rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .stat-card h3 {
            color: #333;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .devices-section {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .devices-section h2 {
            color: #333;
            margin-bottom: 1rem;
        }

        .device-list {
            display: grid;
            gap: 1rem;
        }

        .device-item {
            padding: 1rem;
            border: 1px solid #e1e5e9;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .device-status {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status-online {
            background: #d4edda;
            color: #155724;
        }

        .status-offline {
            background: #f8d7da;
            color: #721c24;
        }

        .loading {
            text-align: center;
            color: #666;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <!-- Login Form -->
    <div class="container" id="loginForm">
        <div class="logo">
            <h1>🔌 IoT Monitor</h1>
            <p>Industrial IoT Monitoring System</p>
        </div>
        
        <div class="error" id="errorMessage"></div>
        <div class="success" id="successMessage"></div>
        
        <form id="loginFormElement">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" id="loginBtn">Login</button>
        </form>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <div class="header">
            <h1>🔌 IoT Monitoring Dashboard</h1>
            <div class="user-info">
                <span>Welcome, <span id="userName">Admin</span></span>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Devices</h3>
                <div class="stat-value" id="totalDevices">-</div>
            </div>
            <div class="stat-card">
                <h3>Online Devices</h3>
                <div class="stat-value" id="onlineDevices">-</div>
            </div>
            <div class="stat-card">
                <h3>Total Users</h3>
                <div class="stat-value" id="totalUsers">-</div>
            </div>
            <div class="stat-card">
                <h3>Data Points</h3>
                <div class="stat-value" id="totalData">-</div>
            </div>
        </div>

        <div class="devices-section">
            <h2>Device Status</h2>
            <div class="device-list" id="deviceList">
                <div class="loading">Loading devices...</div>
            </div>
        </div>
    </div>

    <script>
        // Force HTTP for API when browser upgrades page to HTTPS (avoids ERR_SSL_PROTOCOL_ERROR)
        window.API_BASE = (window.location.protocol === 'https:' && !window.location.hostname.match(/^localhost|127\.0\.0\.1$/))
            ? 'http://' + window.location.host + '/api'
            : '/api';

        let token = localStorage.getItem('iot_token');
        let user = JSON.parse(localStorage.getItem('iot_user') || '{}');

        // Check if user is already logged in
        if (token && user.username) {
            showDashboard();
        }

        // Add event listeners
        document.addEventListener('DOMContentLoaded', function() {
            // Logout button event listener
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', logout);
            }
        });

        // Login form handler
        document.getElementById('loginFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            
            try {
                const response = await fetch(window.API_BASE + '/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    token = data.token;
                    user = data.user;
                    
                    localStorage.setItem('iot_token', token);
                    localStorage.setItem('iot_user', JSON.stringify(user));
                    
                    showMessage('Login successful!', 'success');
                    setTimeout(showDashboard, 1000);
                } else {
                    showMessage(data.error || 'Login failed', 'error');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });

        function showMessage(message, type) {
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            
            if (type === 'error') {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
            } else {
                successDiv.textContent = message;
                successDiv.style.display = 'block';
                errorDiv.style.display = 'none';
            }
        }

        function showDashboard() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            
            document.getElementById('userName').textContent = user.username;
            
            loadDashboardData();
        }

        async function loadDashboardData() {
            try {
                // Load overview data
                const overviewResponse = await fetch(window.API_BASE + '/dashboard/overview', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (overviewResponse.ok) {
                    const overview = await overviewResponse.json();
                    
                    document.getElementById('totalDevices').textContent = overview.overview.totalDevices;
                    document.getElementById('onlineDevices').textContent = overview.deviceStatus.find(s => s.status === 'online')?.count || 0;
                    document.getElementById('totalUsers').textContent = overview.overview.totalUsers;
                    document.getElementById('totalData').textContent = overview.overview.totalSensorData + overview.overview.totalGpsData;
                }

                // Load devices
                const devicesResponse = await fetch(window.API_BASE + '/devices', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (devicesResponse.ok) {
                    const devices = await devicesResponse.json();
                    displayDevices(devices.devices);
                }
            } catch (error) {
                console.error('Error loading dashboard data:', error);
            }
        }

        function displayDevices(devices) {
            const deviceList = document.getElementById('deviceList');
            
            if (devices.length === 0) {
                deviceList.innerHTML = '<div class="loading">No devices found. Add your first device to get started!</div>';
                return;
            }
            
            deviceList.innerHTML = devices.map(device => `
                <div class="device-item">
                    <div>
                        <strong>${device.name}</strong><br>
                        <small>${device.device_id} • ${device.protocol}</small>
                    </div>
                    <span class="device-status status-${device.status}">${device.status}</span>
                </div>
            `).join('');
        }

        function logout() {
            localStorage.removeItem('iot_token');
            localStorage.removeItem('iot_user');
            
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }
    </script>
</body>
</html>
